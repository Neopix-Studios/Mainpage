<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Timeline Diverted | Neopix Studios™</title>
    <style>
        /* Base Reset & Fonts */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        body {
            /* True dark background with the subtle dot grid pattern */
            background-color: #030303;
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 900px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Orange Accent Badge */
        .status-badge {
            background-color: #f39c12; 
            color: #000000;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 6px 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2rem;
            display: inline-block;
        }

        /* Cinematic Gradient Title */
        .error-title {
            font-family: 'Arial Black', Impact, sans-serif;
            font-style: italic;
            font-size: clamp(3rem, 8vw, 6.5rem);
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            line-height: 1.1;
            
            /* Metallic white-to-gray vertical gradient */
            background: linear-gradient(to bottom, #ffffff 30%, #555555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Elegant Thin Subtitle */
        .subtitle {
            color: #8a8a93;
            font-size: 1.25rem;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 3.5rem;
            max-width: 600px;
        }

        /* Button Container */
        .btn-group {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        /* Base Button Styling */
        .btn {
            text-decoration: none;
            padding: 16px 36px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }

        /* Primary Button (Solid White) */
        .btn-primary {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #ffffff;
        }

        .btn-primary:hover {
            background-color: #d4d4d4;
            border-color: #d4d4d4;
        }

        /* Secondary Button (Transparent with subtle border) */
        .btn-secondary {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #333333;
        }

        .btn-secondary:hover {
            border-color: #ffffff;
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Icon SVG */
        .icon-home {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* Footer Branding */
        .footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.75rem;
            color: #444;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            .btn-group {
                flex-direction: column;
                width: 100%;
                gap: 1rem;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-badge">Page Not Found</div>
        
        <h1 class="error-title">404: REALITY DIVERTED</h1>
        
        <p class="subtitle">The requested timeline could not be synchronized.<br>Wait... where are we?</p>
        
        <div class="btn-group">
            <a href="/" class="btn btn-primary">
                <svg class="icon-home" viewBox="0 0 24 24">
                    <path d="M12 3l10 9h-3v9h-14v-9h-3z" />
                </svg>
                Return to Hub
            </a>
            <a href="https://discord.gg/gGvVW9cmcT" target="_blank" rel="noopener noreferrer" class="btn btn-secondary">Report Corruption</a>
        </div>
    </div>

    <div class="footer">
        Neopix Studios&trade; | &copy; 2026. All timelines reserved.
    </div>

</body>
</html>
